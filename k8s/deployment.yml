apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipt-engineering-fundamentals
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ipt-engineering-fundamentals
  template:
    metadata:
      labels:
        app: ipt-engineering-fundamentals
    spec:
      containers:
        - name: frontend
          image: jralrengineeringpd2.azurecr.io/ipt-engineering-fundamentals:3c5f81c7c771f04656e2b0325cb3130860b76ade
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
